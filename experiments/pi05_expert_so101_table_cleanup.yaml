# Pi0.5 train_expert_only fine-tuning for SO-ARM101 table-cleanup task
# Freezes PaliGemma VLM (~2.7B), trains only Action Expert (~300M, ~5-10% params)
# Usage: lerobot-train --yaml_config=experiments/pi05_expert_so101_table_cleanup.yaml
# CLI overrides: lerobot-train --yaml_config=... --steps=10000 --batch_size=8

# --- Dataset ---
dataset:
  repo_id: Atticuxz/so101-table-cleanup

# --- Policy ---
policy:
  type: pi05
  pretrained_path: lerobot/pi05_base
  dtype: bfloat16
  gradient_checkpointing: true
  train_expert_only: true
  compile_model: true
  device: cuda
  push_to_hub: false

# --- Training ---
batch_size: 4
steps: 8000
save_freq: 2000
log_freq: 50
eval_freq: 0

# --- Output ---
output_dir: /root/autodl-tmp/outputs/pi05_expert_so101
job_name: pi05_expert_so101

# --- WandB ---
wandb:
  enable: true
  project: pi05_so101
