# SmolVLA 全量微调 Action Expert for SO-ARM101 pick-orange task
# 冻结 SigLIP Vision Encoder + SmolVLM2 VLM，仅训练 Action Expert
#
# SmolVLA (~450M) 比 Pi0.5 (~3B) 轻量 6x+，单卡 16GB+ 即可微调
# 归一化使用 MEAN_STD（不需要运行 augment_dataset_quantile_stats.py）
#
# Usage:
#   lerobot-train --yaml_config=experiments/smolvla_so101_pick_orange.yaml
#
# CLI overrides:
#   lerobot-train --yaml_config=experiments/smolvla_so101_pick_orange.yaml \
#       --output_dir=/path/to/output --steps=15000 --batch_size=32

# --- Dataset ---
dataset:
  repo_id: Atticuxz/leisaac-pick-orange

# --- Policy ---
policy:
  type: smolvla
  pretrained_path: lerobot/smolvla_base  # 预训练基座 (~450M)
  device: cuda
  push_to_hub: false                    # 必须显式关闭，默认 true 会报错
  # SmolVLA 默认值（以下为显式列出，实际可省略）:
  train_expert_only: true           # 冻结 VLM，仅训练 Action Expert
  freeze_vision_encoder: true       # 冻结 SigLIP 视觉编码器
  #   train_state_proj: true            # 训练 state 投影层
  #   dtype: bfloat16                   # 默认 bf16

# --- Training ---
batch_size: 64                          # SmolVLA 轻量，可开大 batch；显存不够降至 32/16
steps: 10000                            # 60 episodes, bs=64, ~106 epochs
save_freq: 2000                         # 每 2000 步保存 checkpoint
log_freq: 50
eval_freq: 0                            # SO-ARM101 无仿真环境，关闭评估
seed: 1000
num_workers: 4
use_policy_training_preset: true        # 使用 SmolVLA 内置优化器/调度器预设
                                        # lr=1e-4, betas=(0.9,0.95), warmup=1000, decay=30000

# --- Output ---
output_dir: /root/autodl-tmp/outputs/smolvla_so101
job_name: smolvla_so101_pick_orange

# --- WandB ---
wandb:
  enable: true
  project: smolvla_so101
