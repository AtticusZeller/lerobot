# Pi0.5 LoRA fine-tuning for SO-ARM101 table-cleanup task
# Usage: lerobot-train --yaml_config=experiments/pi05_lora_so101_table_cleanup.yaml
# CLI args override YAML values, e.g.: lerobot-train --yaml_config=... --steps=8000

# --- Dataset ---
dataset:
  repo_id: Atticuxz/so101-table-cleanup

# --- Policy ---
policy:
  type: pi05
  pretrained_path: lerobot/pi05_base
  dtype: bfloat16
  gradient_checkpointing: true
  compile_model: true
  device: cuda
  push_to_hub: false

# --- PEFT / LoRA ---
peft:
  method_type: LORA
  r: 16

# --- Training ---
batch_size: 4
steps: 5000
save_freq: 1000
log_freq: 50
eval_freq: 0

# --- Output ---
output_dir: /root/autodl-tmp/outputs/pi05_lora_so101
job_name: pi05_lora_so101

# --- WandB ---
wandb:
  enable: true
  project: pi05_so101
