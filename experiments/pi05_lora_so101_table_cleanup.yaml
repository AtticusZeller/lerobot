# Pi0.5 LoRA 微调 for SO-ARM101 table-cleanup task (备选方案，显存更低)
# 通过 PEFT LoRA 适配器微调，仅更新 ~0.1-1% 参数
#
# Usage:
#   lerobot-train --yaml_config=experiments/pi05_lora_so101_table_cleanup.yaml
#
# CLI overrides:
#   lerobot-train --yaml_config=experiments/pi05_lora_so101_table_cleanup.yaml \
#       --steps=8000 --batch_size=8

# --- Dataset ---
dataset:
  repo_id: Atticuxz/so101-table-cleanup

# --- Policy ---
policy:
  type: pi05
  pretrained_path: lerobot/pi05_base
  dtype: bfloat16
  gradient_checkpointing: true
  compile_model: true
  device: cuda
  push_to_hub: false

# --- PEFT / LoRA ---
peft:
  method_type: LORA
  r: 16

# --- Training ---
batch_size: 4
steps: 5000
save_freq: 1000
log_freq: 50
eval_freq: 0
seed: 1000
num_workers: 4
use_policy_training_preset: true

# --- Output ---
output_dir: /root/autodl-tmp/outputs/pi05_lora_so101
job_name: pi05_lora_so101

# --- WandB ---
wandb:
  enable: true
  project: pi05_so101
