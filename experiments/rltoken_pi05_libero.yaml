# RL Token + π0.5 LIBERO simulation config.

pretrained_pi05: lerobot/pi05_libero

libero:
  suite: libero_spatial
  max_episode_steps: 400

rltoken:
  embedding_dim: 2048
  encoder_layers: 2
  encoder_heads: 8
  decoder_layers: 2
  decoder_heads: 8

dataset:
  repo_id: lerobot/libero
  batch_size: 32
  num_workers: 4
  task_index: null

stage1:
  num_train_steps: 5000
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  max_grad_norm: 1.0
  log_every: 50
  ckpt_every: 1000

td3:
  action_chunk_size: 8
  actor_hidden: 256
  actor_hidden_layers: 2
  actor_noise_sigma: 0.1
  bc_coef: 0.5
  ref_action_dropout: 0.5
  gamma: 0.99
  tau: 0.005
  update_to_data_ratio: 5
  critic_updates_per_actor: 2
  target_noise_sigma: 0.2
  target_noise_clip: 0.5
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4

training:
  stage2_steps: 200000
  warmup_steps: 1000
  batch_size: 256
  buffer_capacity: 100000
  save_every: 50
  log_every: 1

wandb:
  project: rltoken-pi05-libero
  enabled: true
